# SkyWatch controller — Phase 2.1 scaffold
# Goal: board boots, ACM0 = Zephyr shell, ACM1 = data port (present, idle).
# BLE / Kalman / Watchdog Kconfig will be re-added in Phase 3 / 7 respectively.

# GPIO for the heartbeat LED (green = up, off-during-init = red). Same pattern
# as the mobile sim node (resources/importedcode/Will_BLE/mobile/codein.c).
CONFIG_GPIO=y

# Stack-overflow guard. With Phase 9's IMM EKF math eating ~1.5 KB of stack
# per aircraft_db_upsert(), a 2048 B bridge thread silently overflowed on
# the first BLE frame from the sim. With this flag on (uses the Cortex-M
# MPU), an overflow now hits an oops + reboots cleanly so the symptom is
# visible in logs rather than a wedged heartbeat LED.
CONFIG_HW_STACK_PROTECTION=y

# Shell — routed through USB CDC ACM0 (board-default shell-uart)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_LOG_PRINTK=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_VT100_COLORS=n
# Bigger shell-uart RX ring so collision + db_publisher log spam doesn't
# trigger 'RX ring buffer full' on ACM0 during heavy ticks.
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=512

# USB CDC ACM — custom init in usb_device.c registers cdc_acm_0 (shell/ttyACM0)
# then cdc_acm_1 (data/ttyACM1, from app.overlay).
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# UART line control — needed for DTR detection on the data CDC ACM port
CONFIG_UART_LINE_CTRL=y

# UART interrupt-driven Rx + ring buffer for data-port frame reassembly (Phase 2.2)
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# JSON parser + double-precision FP for lat/lon/ts (Phase 2.3)
CONFIG_JSON_LIBRARY=y
CONFIG_JSON_LIBRARY_FP_SUPPORT=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Bluetooth — central role, GATT client, scanning, larger MTU/buffers for the
# 38-byte ble_aircraft_frame (default ATT MTU=23 would not fit).  (Phase 3.x)
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_SCAN_WITH_IDENTITY=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_DEVICE_NAME="skywatch-controller"

# Logging — shell log backend handles output
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096

# Memory — modest defaults; later phases will bump heap
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
# 4096 because collision.c work_handler runs on the system queue and now
# also drives diversion-picker + crash-frame BLE sends with double-precision
# bearing math. With 32-aircraft snap buffer + pair loop + multiple JSON
# snprintfs, the original 2048 B was right on the edge; bumping for
# headroom (Phase 9 IMM stack-blew the bridge thread at 2048 B too).
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
