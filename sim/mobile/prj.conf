# Mobile node: peripheral (NUS server) + aircraft simulation

# BLE — peripheral role for base to connect
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Device name — matches SKYWATCH_BLE_DEVICE_NAME in ble_packet.h
CONFIG_BT_DEVICE_NAME="skywatch-sim"

# Large MTU and buffers
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6

# Dual CDC ACM — ttyACM0 = shell, ttyACM1 = binary data to GUI
CONFIG_USBD_CDC_ACM_CLASS=y

# Shell — routed to ttyACM0 via board_cdc_acm_uart (board DTSI default)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=512
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_LOG_PRINTK=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_VT100_COLORS=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# Watchdog
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# FPU — required for cosf/sinf in dead reckoning
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048